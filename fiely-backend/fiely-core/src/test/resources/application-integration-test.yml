# Profile used by AuthPluginIntegrationTest. Datasource + plugins dir come
# from @DynamicPropertySource so they point at the Testcontainers Postgres
# and the Gradle-built plugin JAR respectively.
spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
