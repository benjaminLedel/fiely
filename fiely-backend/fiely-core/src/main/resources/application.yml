spring:
  application:
    name: fiely-backend
  datasource:
    url: ${FIELY_DB_URL:jdbc:postgresql://localhost:5432/fiely}
    username: ${FIELY_DB_USER:fiely}
    password: ${FIELY_DB_PASSWORD:fiely}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # Transport-layer ceiling — per-tenant limits are enforced in FileService
      # from the tenants.max_upload_bytes column. Raise this if you intend to
      # set any tenant above 1 GiB.
      max-file-size: ${FIELY_MAX_UPLOAD_SIZE:1GB}
      max-request-size: ${FIELY_MAX_UPLOAD_SIZE:1GB}

fiely:
  plugins:
    dir: ${FIELY_PLUGINS_DIR:./plugins}
    fiely-auth-jwt:
      secret: ${FIELY_JWT_SECRET:}
      issuer: ${FIELY_JWT_ISSUER:fiely}
      access-token-ttl: ${FIELY_JWT_ACCESS_TTL:3600}
      refresh-token-ttl: ${FIELY_JWT_REFRESH_TTL:604800}
    fiely-storage-local:
      root: ${FIELY_STORAGE_LOCAL_ROOT:./data/blobs}
  storage:
    # Id of the StorageProvider plugin to write new uploads through. Existing
    # rows keep their original storage_id so switching providers doesn't break
    # downloads of previously-uploaded files.
    provider: ${FIELY_STORAGE_PROVIDER:fiely-storage-local}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  # Scan every bean annotated with @RestController (the default). Plugin
  # controllers loaded via PF4J end up as regular Spring beans in the
  # parent context, so they are picked up automatically.
  show-actuator: false
