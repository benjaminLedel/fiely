name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/fiely-core

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fiely-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --info --stacktrace

      - name: Print failing test details
        if: failure()
        run: |
          echo "::group::All test result XML files"
          shopt -s globstar nullglob
          # `working-directory: fiely-backend` (job defaults) is in effect.
          mapfile -t xml_files < <(printf '%s\n' **/build/test-results/test/TEST-*.xml)
          if [ "${#xml_files[@]}" -eq 0 ]; then
            echo "No TEST-*.xml files were produced — failure happened before tests ran."
          else
            for f in "${xml_files[@]}"; do
              echo "found: $f"
            done
          fi
          echo "::endgroup::"

          echo "::group::Failing tests (full XML)"
          any=false
          for f in "${xml_files[@]}"; do
            if grep -q -E '<(failure|error)' "$f"; then
              any=true
              echo "=================================================="
              echo "::error::Failures in $f"
              cat "$f"
              echo
            fi
          done
          $any || echo "No <failure> or <error> elements in any TEST-*.xml."
          echo "::endgroup::"

          echo "::group::Standard out / err captured by Gradle"
          for f in **/build/test-results/test/*.xml; do : ; done
          for d in **/build/reports/tests/test; do
            [ -d "$d" ] && echo "report dir: $d (see uploaded artifact)"
          done
          echo "::endgroup::"

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            fiely-backend/**/build/reports/tests/
            fiely-backend/**/build/test-results/
          retention-days: 7

      - name: Upload fiely-core JAR
        uses: actions/upload-artifact@v4
        with:
          name: fiely-core-jar
          path: fiely-backend/fiely-core/build/libs/*.jar
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: fiely-backend
          file: fiely-backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
