name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/fiely-core

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fiely-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --info --stacktrace 2>&1 | tee /tmp/gradle.log
        shell: bash

      - name: Print failing test details
        if: failure()
        shell: bash
        run: |
          shopt -s globstar nullglob
          # `working-directory: fiely-backend` (job defaults) is in effect.
          mapfile -t xml_files < <(printf '%s\n' **/build/test-results/test/TEST-*.xml)
          echo "Found ${#xml_files[@]} TEST-*.xml files"

          # Emit each <failure>/<error> as its own annotation. Annotations are
          # exposed via the public check-runs/{id}/annotations API, so we can
          # see the real failure cause without needing log-download auth.
          python3 - <<'PY' "${xml_files[@]}"
          import sys, xml.etree.ElementTree as ET
          def esc(s):
              # GitHub annotations need %0A / %0D for newlines, %25 for %
              return (s or "").replace("%","%25").replace("\n","%0A").replace("\r","%0D")
          any_failure = False
          for path in sys.argv[1:]:
              try:
                  tree = ET.parse(path)
              except Exception as e:
                  print(f"::error::Could not parse {path}: {e}")
                  continue
              for tc in tree.getroot().iter("testcase"):
                  cls = tc.get("classname", "?")
                  name = tc.get("name", "?")
                  for el in list(tc):
                      if el.tag in ("failure", "error"):
                          any_failure = True
                          msg = el.get("message", "")
                          typ = el.get("type", el.tag)
                          body = (el.text or "")[:8000]
                          full = f"{typ}: {msg}\n\n{body}"
                          # Annotation
                          print(f"::error title={cls} :: {name}::{esc(full)}")
                          # Also human-readable in the log
                          print(f"\n========== FAILED: {cls}.{name} ==========")
                          print(f"{typ}: {msg}")
                          print(body)
                          print("=========================================\n")
          if not any_failure:
              print("No <failure> or <error> elements found in any TEST-*.xml")
          PY

          echo "::group::Plugin / PF4J init lines from Gradle log"
          if [ -f /tmp/gradle.log ]; then
            # The interesting lines from Spring init.
            grep -nE 'FielyPluginManager|PluginMigration|pf4j|PF4J|fiely-auth-jwt|loadPlugins|extensions\.idx|Loading plugins from|Plugin manager started|No plugin migrations|Skipping PluginMigrations' /tmp/gradle.log | head -200 || echo "(no matches)"
          else
            echo "/tmp/gradle.log not found"
          fi
          echo "::endgroup::"

          # Also surface the plugin-loading lines as annotations so they're
          # visible via the API without auth.
          if [ -f /tmp/gradle.log ]; then
            python3 - <<'PY'
          import re
          patterns = [
              r'FielyPluginManager', r'PluginMigration', r'fiely-auth-jwt',
              r'loadPlugins', r'Loading plugins from', r'Plugin manager started',
              r'Skipping PluginMigrations', r'No plugin migrations',
          ]
          rx = re.compile('|'.join(patterns))
          lines = []
          with open('/tmp/gradle.log') as f:
              for line in f:
                  if rx.search(line):
                      lines.append(line.rstrip())
          if lines:
              # Pack into chunks under GitHub's annotation size limit (~64KB).
              chunk, size, idx = [], 0, 0
              for ln in lines[:200]:
                  if size + len(ln) > 4000 and chunk:
                      msg = '%0A'.join(chunk).replace('%','%25')
                      print(f"::warning title=Plugin init log (chunk {idx})::{msg}")
                      idx += 1; chunk, size = [], 0
                  chunk.append(ln); size += len(ln)
              if chunk:
                  msg = '%0A'.join(chunk).replace('%','%25')
                  print(f"::warning title=Plugin init log (chunk {idx})::{msg}")
          PY
          fi

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            fiely-backend/**/build/reports/tests/
            fiely-backend/**/build/test-results/
          retention-days: 7

      - name: Upload fiely-core JAR
        uses: actions/upload-artifact@v4
        with:
          name: fiely-core-jar
          path: fiely-backend/fiely-core/build/libs/*.jar
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: fiely-backend
          file: fiely-backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
