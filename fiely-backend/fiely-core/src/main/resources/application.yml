spring:
  application:
    name: fiely-backend
  datasource:
    url: ${FIELY_DB_URL:jdbc:postgresql://localhost:5432/fiely}
    username: ${FIELY_DB_USER:fiely}
    password: ${FIELY_DB_PASSWORD:fiely}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
