spring:
  datasource:
    url: jdbc:h2:mem:fiely;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

fiely:
  plugins:
    # Point at an empty, temporary directory so tests don't pick up any
    # jars from the developer's working tree.
    dir: ${java.io.tmpdir}/fiely-test-plugins
